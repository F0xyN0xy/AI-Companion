<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Companion</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: #1a1a2e;
    color: #faf9f6;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 24px;
  }
  .wrap { max-width: 480px; }
  h1 { font-family: 'DM Serif Display', serif; font-size: 42px; color: #c8a96e; margin-bottom: 16px; }
  p { color: rgba(250,249,246,.65); line-height: 1.7; font-size: 16px; margin-bottom: 32px; }
  .badge { display: inline-block; background: rgba(200,169,110,.1); border: 1px solid rgba(200,169,110,.25); color: #c8a96e; border-radius: 20px; padding: 4px 14px; font-size: 12px; margin-bottom: 20px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="badge">Desktop App</div>
  <h1>AI Companion</h1>
  <p>This is the backend service for AI Companion. Download the desktop app to get started.</p>
</div>
</body>
</html>
